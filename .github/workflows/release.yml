name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  XCODE_PATH: /Applications/Xcode_26.3.app
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── Stage 1: Test ────────────────────────────────────────

  test:
    name: 🧪 Test
    runs-on: macos-15

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: 🔧 Select Xcode
        run: sudo xcode-select -s ${{ env.XCODE_PATH }}

      - name: 📦 Restore SPM cache
        uses: actions/cache@v5
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: spm-${{ runner.os }}-

      - name: 🧪 Run tests
        run: swift test

  # ── Stage 2: Build ───────────────────────────────────────

  build:
    name: 🔨 Build
    runs-on: macos-15
    needs: test

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: 🔧 Select Xcode
        run: sudo xcode-select -s ${{ env.XCODE_PATH }}

      - name: 📦 Restore SPM cache
        uses: actions/cache@v5
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: spm-${{ runner.os }}-

      - name: 🏷️ Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: 📌 Update version in project files
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          sed -i '' "s/^VERSION      := .*/VERSION      := ${VERSION}/" Makefile
          sed -i '' "/CFBundleShortVersionString/{n;s|<string>.*</string>|<string>${VERSION}</string>|;}" Resources/Info.plist
          BUILD=$(sed -n '/CFBundleVersion/{n;s/.*<string>\(.*\)<\/string>.*/\1/p;}' Resources/Info.plist)
          NEW_BUILD=$(( BUILD + 1 ))
          sed -i '' "/CFBundleVersion/{n;s|<string>.*</string>|<string>${NEW_BUILD}</string>|;}" Resources/Info.plist
          echo "Version: ${VERSION}, Build: ${NEW_BUILD}"

      - name: 🔨 Build app bundle
        run: make app

      - name: 📦 Create release zip
        run: cd build && zip -r SmartDock-${{ steps.version.outputs.VERSION }}.zip SmartDock.app

      - name: ⬆️ Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: SmartDock-${{ steps.version.outputs.VERSION }}
          path: build/SmartDock-${{ steps.version.outputs.VERSION }}.zip

  # ── Stage 3: GitHub Release ──────────────────────────────

  release:
    name: 🎉 Release
    runs-on: macos-15
    needs: build

    steps:
      - name: 🏷️ Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: ⬇️ Download artifact
        uses: actions/download-artifact@v5
        with:
          name: SmartDock-${{ steps.version.outputs.VERSION }}

      - name: 🎉 Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          TAG=${{ github.ref_name }}
          ZIP=SmartDock-${VERSION}.zip

          if gh release view "${TAG}" --repo "${{ github.repository }}" &>/dev/null; then
            echo "Release exists — uploading asset"
            gh release upload "${TAG}" "${ZIP}" --clobber --repo "${{ github.repository }}"
          else
            gh release create "${TAG}" "${ZIP}" \
              --repo "${{ github.repository }}" \
              --title "SmartDock ${VERSION}" \
              --generate-notes
          fi

  # ── Stage 4: Homebrew Tap ────────────────────────────────

  homebrew:
    name: 🍺 Homebrew
    runs-on: macos-15
    needs: release

    steps:
      - name: 🏷️ Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: 🔑 Setup SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.TAP_DEPLOY_KEY }}

      - name: 🍺 Update Homebrew tap
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          REPO=${{ github.repository }}
          ZIP_URL="https://github.com/${REPO}/releases/download/v${VERSION}/SmartDock-${VERSION}.zip"
          TAR_URL="https://github.com/${REPO}/archive/refs/tags/v${VERSION}.tar.gz"

          # Wait for release asset
          sleep 10

          # Compute checksums
          ZIP_SHA=$(curl -sL "${ZIP_URL}" | shasum -a 256 | cut -d' ' -f1)
          TAR_SHA=$(curl -sL "${TAR_URL}" | shasum -a 256 | cut -d' ' -f1)
          echo "Cask SHA256:    ${ZIP_SHA}"
          echo "Formula SHA256: ${TAR_SHA}"

          # Clone tap repo
          git clone git@github.com:alexeikaratai/homebrew-tap.git /tmp/tap
          cd /tmp/tap

          # Update Cask
          sed -i '' "s/version \".*\"/version \"${VERSION}\"/" Casks/smartdock.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${ZIP_SHA}\"/" Casks/smartdock.rb

          # Update Formula
          sed -i '' "s|/v[0-9]*\.[0-9]*\.[0-9]*/|/v${VERSION}/|g" Formula/smartdock.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${TAR_SHA}\"/" Formula/smartdock.rb

          # Commit & push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update SmartDock to v${VERSION}"
          git push
