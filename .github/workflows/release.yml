name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Select Xcode 26.4
        run: sudo xcode-select -s /Applications/Xcode_26.4.app

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: swift test --parallel

      - name: Update version in project files
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          sed -i '' "s/^VERSION      := .*/VERSION      := ${VERSION}/" Makefile
          sed -i '' "/CFBundleShortVersionString/{n;s|<string>.*</string>|<string>${VERSION}</string>|;}" Resources/Info.plist
          # Increment build number
          BUILD=$(sed -n '/CFBundleVersion/{n;s/.*<string>\(.*\)<\/string>.*/\1/p;}' Resources/Info.plist)
          NEW_BUILD=$(( BUILD + 1 ))
          sed -i '' "/CFBundleVersion/{n;s|<string>.*</string>|<string>${NEW_BUILD}</string>|;}" Resources/Info.plist

      - name: Build app bundle
        run: make app

      - name: Create release zip
        run: cd build && zip -r SmartDock-${{ steps.version.outputs.VERSION }}.zip SmartDock.app

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view ${{ github.ref_name }} &>/dev/null; then
            echo "Release exists — uploading asset"
            gh release upload ${{ github.ref_name }} \
              build/SmartDock-${{ steps.version.outputs.VERSION }}.zip --clobber
          else
            gh release create ${{ github.ref_name }} \
              build/SmartDock-${{ steps.version.outputs.VERSION }}.zip \
              --title "SmartDock ${{ steps.version.outputs.VERSION }}" \
              --generate-notes
          fi

      - name: Setup SSH for Homebrew tap
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.TAP_DEPLOY_KEY }}

      - name: Update Homebrew tap
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          ZIP_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/SmartDock-${VERSION}.zip"

          # Wait for release asset to be available
          sleep 10

          # Compute sha256
          ZIP_SHA=$(curl -sL "${ZIP_URL}" | shasum -a 256 | cut -d' ' -f1)
          echo "SHA256: ${ZIP_SHA}"

          # Clone tap repo via SSH deploy key
          git clone git@github.com:alexeikaratai/homebrew-tap.git /tmp/tap
          cd /tmp/tap

          # Update Cask
          sed -i '' "s/version \".*\"/version \"${VERSION}\"/" Casks/smartdock.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${ZIP_SHA}\"/" Casks/smartdock.rb

          # Update Formula
          sed -i '' "s|/v[0-9]*\.[0-9]*\.[0-9]*/|/v${VERSION}/|g" Formula/smartdock.rb
          TAR_SHA=$(curl -sL "https://github.com/${{ github.repository }}/archive/refs/tags/v${VERSION}.tar.gz" | shasum -a 256 | cut -d' ' -f1)
          sed -i '' "s/sha256 \".*\"/sha256 \"${TAR_SHA}\"/" Formula/smartdock.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update SmartDock to v${VERSION}"
          git push
